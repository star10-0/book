name: Secret Scan

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608
        with:
          fetch-depth: 0

      - name: Run gitleaks (container, pinned)
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.24.2 \
            detect \
            --source . \
            --log-opts="--all" \
            --config .gitleaks.toml \
            --redact \
            --exit-code 1

      - name: Install dependencies
        run: npm ci

      - name: Build app for bundle scan
        run: npm run build

      - name: Scan built client bundle for accidental secrets
        run: npm run security:scan:bundle
