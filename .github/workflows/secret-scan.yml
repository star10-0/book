name: Secret Scan

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.0 \
            detect --source=/repo --config=/repo/.gitleaks.toml --verbose

      - name: Write success summary
        if: ${{ success() }}
        run: |
          {
            echo "## Gitleaks summary"
            echo ""
            echo "✅ No leaks detected"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write failure summary
        if: ${{ failure() }}
        run: |
          {
            echo "## Gitleaks summary"
            echo ""
            echo "❌ Potential leaks detected"
          } >> "$GITHUB_STEP_SUMMARY"
