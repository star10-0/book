services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: book-app:latest
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - app_public_uploads:/app/public/uploads
      - app_private_uploads:/app/storage/private/uploads
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode >= 500 ? 1 : 0)).on('error', () => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  app_public_uploads:
  app_private_uploads:
